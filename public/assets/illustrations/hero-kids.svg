<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" fill="none" aria-hidden="true">
  <!-- Soft yellow sun glow -->
  <circle cx="160" cy="90" r="56" fill="#FDECC5" opacity="0.55"/>
  <!-- Sun -->
  <circle cx="160" cy="90" r="38" fill="#F3B337"/>
  <!-- Sun rays -->
  <g stroke="#F3B337" stroke-width="6" stroke-linecap="round">
    <line x1="160" y1="36" x2="160" y2="22"/>
    <line x1="160" y1="158" x2="160" y2="144"/>
    <line x1="106" y1="90" x2="92"  y2="90"/>
    <line x1="228" y1="90" x2="214" y2="90"/>
    <line x1="121" y1="51" x2="111" y2="41"/>
    <line x1="209" y1="139" x2="199" y2="129"/>
    <line x1="199" y1="51" x2="209" y2="41"/>
    <line x1="111" y1="139" x2="121" y2="129"/>
  </g>
  <!-- Sun face -->
  <circle cx="148" cy="84" r="3.6" fill="#1F3A7A"/>
  <circle cx="172" cy="84" r="3.6" fill="#1F3A7A"/>
  <path d="M148 100 Q160 112 172 100" stroke="#1F3A7A" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Sun cheeks -->
  <circle cx="142" cy="96" r="3" fill="#F0704D" opacity="0.6"/>
  <circle cx="178" cy="96" r="3" fill="#F0704D" opacity="0.6"/>

  <!-- Rainbow -->
  <g transform="translate(310 80)">
    <path d="M0 90 A90 90 0 0 1 180 90" stroke="#E85A9B" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M14 90 A76 76 0 0 1 166 90" stroke="#F0704D" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M28 90 A62 62 0 0 1 152 90" stroke="#F3B337" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M42 90 A48 48 0 0 1 138 90" stroke="#1F8E5A" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M56 90 A34 34 0 0 1 124 90" stroke="#4FB3E6" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Heart -->
  <g transform="translate(258 60)">
    <path d="M14 24 C14 16, 24 12, 28 18 C32 12, 42 16, 42 24 C42 32, 28 42, 28 42 C28 42, 14 32, 14 24 Z" fill="#E85A9B"/>
  </g>

  <!-- Cloud (left) -->
  <g transform="translate(60 162)" fill="#FFFFFF" stroke="#C6D1E8" stroke-width="2">
    <ellipse cx="30" cy="20" rx="30" ry="14"/>
    <circle cx="14" cy="14" r="11"/>
    <circle cx="40" cy="10" r="13"/>
  </g>

  <!-- Cloud (right) -->
  <g transform="translate(390 175)" fill="#FFFFFF" stroke="#C6D1E8" stroke-width="2">
    <ellipse cx="28" cy="18" rx="28" ry="13"/>
    <circle cx="14" cy="13" r="10"/>
    <circle cx="38" cy="9"  r="11"/>
  </g>

  <!-- Leaf (bottom-left) -->
  <g transform="translate(220 150)">
    <path d="M0 30 C0 8, 22 -4, 44 8 C40 30, 22 44, 0 30 Z" fill="#1F8E5A"/>
    <path d="M6 28 C16 18, 30 14, 40 14" stroke="#0C5C3A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
</svg>
