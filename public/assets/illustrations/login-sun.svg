<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDECC5" stop-opacity="0.7"/>
      <stop offset="60%" stop-color="#FDECC5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FDECC5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Soft halo -->
  <circle cx="70" cy="70" r="68" fill="url(#sunGlow)"/>
  <!-- Sun rays -->
  <g stroke="#F3B337" stroke-width="6" stroke-linecap="round">
    <line x1="70" y1="14" x2="70" y2="2"/>
    <line x1="70" y1="138" x2="70" y2="126"/>
    <line x1="14" y1="70" x2="2"  y2="70"/>
    <line x1="138" y1="70" x2="126" y2="70"/>
    <line x1="29" y1="29" x2="20"  y2="20"/>
    <line x1="120" y1="120" x2="111" y2="111"/>
    <line x1="111" y1="29" x2="120" y2="20"/>
    <line x1="20" y1="120" x2="29"  y2="111"/>
  </g>
  <!-- Sun body -->
  <circle cx="70" cy="70" r="42" fill="#F3B337"/>
  <!-- Cheeks -->
  <ellipse cx="50" cy="80" rx="6" ry="4" fill="#F0704D" opacity="0.55"/>
  <ellipse cx="90" cy="80" rx="6" ry="4" fill="#F0704D" opacity="0.55"/>
  <!-- Eyes -->
  <circle cx="58" cy="66" r="4" fill="#1F3A7A"/>
  <circle cx="82" cy="66" r="4" fill="#1F3A7A"/>
  <!-- Smile -->
  <path d="M56 80 Q70 92 84 80" stroke="#1F3A7A" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
